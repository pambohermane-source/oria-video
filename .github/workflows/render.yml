name: Render ORIA Video
on:
  push:
    branches: [main]
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Render video
        run: npx remotion render OriaVideo45s out/oria_45s.mp4 --codec=h264 --crf=16
      - name: Upload MP4
        uses: actions/upload-artifact@v4
        with:
          name: oria-video
          path: out/oria_45s.mp4
